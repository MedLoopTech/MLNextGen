services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medloop_nextgen
      POSTGRES_USER: medloop
      POSTGRES_PASSWORD: medloop_dev_only
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  app:
    build: .
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=db;Port=5432;Database=medloop_nextgen;Username=medloop;Password=medloop_dev_only"
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  db-data:
